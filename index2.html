<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Annand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0c0b09; --chalk: #ede9e4; --stone: #6e6860;
    --amber: #b89060; --slate: #1a1815;
  }
  html { height: 100%; }
  body {
    height: 100%; background: var(--ink); color: var(--chalk);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 48px;
    background: #143e1a; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(237,233,228,0.85); text-decoration: none;
  }
  .nav-links { display: flex; list-style: none; position: relative; }
  .nav-item { position: relative; }
  .nav-item > a {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(237,233,228,0.85); text-decoration: none;
    transition: color 0.2s; padding: 8px 20px; display: block;
  }
  .nav-item > a:hover { opacity: 0.75; }
  .dropdown-wrap {
    position: absolute; top: 100%; right: 0;
    overflow: hidden; max-height: 0;
    transition: max-height 0.3s ease; min-width: 200px;
  }
  .nav-item:hover > .dropdown-wrap {
    max-height: 400px; overflow: visible; pointer-events: all;
  }
  .dropdown {
    background: #143e1a; padding: 8px 0 12px;
    pointer-events: none; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  }
  .nav-item:hover > .dropdown-wrap .dropdown { pointer-events: all; }
  .dropdown a {
    display: block; padding: 10px 20px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(237,233,228,0.8); text-decoration: none;
    transition: color 0.2s, background 0.2s; white-space: nowrap;
  }
  .dropdown a:hover { color: var(--chalk); background: rgba(237,233,228,0.05); }
  .dd-divider { height: 1px; background: rgba(237,233,228,0.12); margin: 6px 0; }

  .hero { height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }

  .hero-left {
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 48px 48px 64px;
    background: #0c1219;
    position: relative; overflow: hidden;
  }
  .hero-left h1, .hero-left .hero-role { position: relative; z-index: 2; }
  h1.hero-name {
    font-family: 'Bodoni Moda', Georgia, serif;
    font-size: clamp(58px, 6.5vw, 105px);
    font-weight: 400; line-height: 1;
    letter-spacing: 0em; color: #c5bda8;
    opacity: 0; animation: fadeUp 1s ease 0.4s forwards;
    white-space: nowrap;
  }
  .hero-role {
    margin-top: 16px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(197,189,168,0.7);
    opacity: 0; animation: fadeUp 1s ease 0.6s forwards;
  }

  .hero-right { position: relative; overflow: hidden; }
  .painting-wrap {
    position: absolute; inset: 0;
    opacity: 0; animation: fadeIn 1.5s ease 0.1s forwards;
    display: flex; align-items: center; justify-content: center;
  }
  .painting-img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: 50% 50%; display: block;
    filter: saturate(0.88) brightness(0.94);
  }
  .painting-caption {
    position: absolute; bottom: 32px; right: 32px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(237,233,228,0.35); text-align: right; line-height: 1.8;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .flyout-item { position: relative; }
  .flyout-trigger {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(237,233,228,0.8); text-decoration: none;
    transition: color 0.2s, background 0.2s; white-space: nowrap;
    cursor: default;
  }
  .flyout-trigger:hover { color: var(--chalk); background: rgba(237,233,228,0.05); }
  .flyout-arrow { opacity: 0.5; margin-left: 12px; font-size: 12px; }
  .flyout {
    position: absolute; left: 100%; top: 0;
    background: #143e1a; min-width: 190px; padding: 8px 0;
    box-shadow: 4px 6px 20px rgba(0,0,0,0.4); white-space: nowrap;
    clip-path: inset(0 100% 0 0);
    transition: clip-path 0.22s ease; pointer-events: none;
  }
  .flyout-item:hover > .flyout { clip-path: inset(0 0% 0 0); pointer-events: all; }
  .flyout a {
    display: block; padding: 10px 20px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(237,233,228,0.8); text-decoration: none;
    transition: color 0.2s, background 0.2s;
  }
  .flyout a:hover { color: var(--chalk); background: rgba(237,233,228,0.05); }

  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .nav-links { gap: 0; }
    .nav-item > a { padding: 8px 12px; font-size: 9px; letter-spacing: 0.12em; }
    .dropdown { right: -12px; }
    .hero { grid-template-columns: 1fr; grid-template-rows: 45vh 55vh; }
    .hero-left { padding: 0 24px 32px; justify-content: flex-end; order: 1; }
    .hero-left h1, .hero-left .hero-role { position: relative; z-index: 2; }
    h1.hero-name { font-size: clamp(42px, 11vw, 72px); white-space: normal; }
    .hero-role { font-size: 9px; }
    .hero-right { order: 0; }
    .painting-caption { font-size: 8px; bottom: 16px; right: 16px; }
  }

  #marble-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: all; z-index: 1;
  }
</style>
</head>

  var VS = "attribute vec2 a_pos;\nvoid main() { gl_Position = vec4(a_pos, 0.0, 1.0); }";
  var FS = "precision mediump float;\nuniform vec2  u_res;\nuniform float u_bx[25];\nuniform float u_by[25];\nuniform float u_br[25];\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_res;\n  float f0=0.,f1=0.,f2=0.,f3=0.,f4=0.;\n  { float dx=uv.x-u_bx[0]; float dy=uv.y-u_by[0]; f0+=u_br[0]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[1]; float dy=uv.y-u_by[1]; f0+=u_br[1]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[2]; float dy=uv.y-u_by[2]; f0+=u_br[2]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[3]; float dy=uv.y-u_by[3]; f0+=u_br[3]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[4]; float dy=uv.y-u_by[4]; f0+=u_br[4]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[5]; float dy=uv.y-u_by[5]; f1+=u_br[5]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[6]; float dy=uv.y-u_by[6]; f1+=u_br[6]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[7]; float dy=uv.y-u_by[7]; f1+=u_br[7]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[8]; float dy=uv.y-u_by[8]; f1+=u_br[8]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[9]; float dy=uv.y-u_by[9]; f1+=u_br[9]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[10]; float dy=uv.y-u_by[10]; f2+=u_br[10]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[11]; float dy=uv.y-u_by[11]; f2+=u_br[11]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[12]; float dy=uv.y-u_by[12]; f2+=u_br[12]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[13]; float dy=uv.y-u_by[13]; f2+=u_br[13]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[14]; float dy=uv.y-u_by[14]; f2+=u_br[14]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[15]; float dy=uv.y-u_by[15]; f3+=u_br[15]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[16]; float dy=uv.y-u_by[16]; f3+=u_br[16]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[17]; float dy=uv.y-u_by[17]; f3+=u_br[17]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[18]; float dy=uv.y-u_by[18]; f3+=u_br[18]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[19]; float dy=uv.y-u_by[19]; f3+=u_br[19]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[20]; float dy=uv.y-u_by[20]; f4+=u_br[20]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[21]; float dy=uv.y-u_by[21]; f4+=u_br[21]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[22]; float dy=uv.y-u_by[22]; f4+=u_br[22]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[23]; float dy=uv.y-u_by[23]; f4+=u_br[23]/(dx*dx*0.62+dy*dy+0.0002); }\n  { float dx=uv.x-u_bx[24]; float dy=uv.y-u_by[24]; f4+=u_br[24]/(dx*dx*0.62+dy*dy+0.0002); }\n  vec3 col = vec3(0.047, 0.071, 0.098);\n  float total = f0+f1+f2+f3+f4;\n  if (total >= 1.0) {\n    float m = f0; col = vec3(0.106, 0.212, 0.329);\n    if (f1 > m) { m=f1; col=vec3(0.773, 0.741, 0.659); }\n    if (f2 > m) { m=f2; col=vec3(0.769, 0.565, 0.047); }\n    if (f3 > m) { m=f3; col=vec3(0.702, 0.173, 0.118); }\n    if (f4 > m) {       col=vec3(0.078, 0.243, 0.102); }\n  }\n  gl_FragColor = vec4(col, 1.0);\n}";

  var prog = makeProgram(VS, FS);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER,
    new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  var aPos = gl.getAttribLocation(prog, 'a_pos');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uBX  = gl.getUniformLocation(prog, 'u_bx');
  var uBY  = gl.getUniformLocation(prog, 'u_by');
  var uBR  = gl.getUniformLocation(prog, 'u_br');

  var N  = 25;
  var px = new Float32Array(N);
  var py = new Float32Array(N);
  var vx = new Float32Array(N);
  var vy = new Float32Array(N);
  var hx = new Float32Array(N);
  var hy = new Float32Array(N);
  var br = new Float32Array(N);
  var ph = new Float32Array(N);

  // Seeded RNG
  var seed = 98765;
  function rng() {
    seed = ((seed * 1664525) + 1013904223) >>> 0;
    return seed / 4294967296;
  }

  for (var i = 0; i < N; i++) {
    hx[i] = 0.08 + rng() * 0.84;
    hy[i] = 0.06 + rng() * 0.88;
    px[i] = hx[i];
    py[i] = hy[i];
    ph[i] = rng() * 6.2832;
    var inGroup = i % 5;
    if (inGroup < 2) {
      br[i] = 0.036 + rng() * 0.019;  // large cell
    } else if (inGroup < 4) {
      br[i] = 0.014 + rng() * 0.010;  // medium cell
    } else {
      br[i] = 0.004 + rng() * 0.005;  // tiny satellite
    }
  }

  var mx = -1, my = -1;
  function onMove(cx, cy) {
    var r = canvas.getBoundingClientRect();
    mx = (cx - r.left)  / r.width;
    my = 1 - (cy - r.top) / r.height;
  }
  canvas.addEventListener('mousemove',  function(e) { onMove(e.clientX, e.clientY); });
  canvas.addEventListener('mouseleave', function()  { mx = -1; });
  canvas.addEventListener('touchmove',  function(e) {
    e.preventDefault();
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', function() { mx = -1; });

  var DAMP    = 0.9975;
  var SPRING  = 0.000008;
  var MOUSE_R = 0.30;
  var MOUSE_F = 0.0010;
  var DRIFT   = 0.0000008;

  var t0 = performance.now();

  function update(t) {
    for (var i = 0; i < N; i++) {
      vx[i] += (hx[i] - px[i]) * SPRING;
      vy[i] += (hy[i] - py[i]) * SPRING;
      vx[i] += Math.sin(t * 0.000130 + ph[i]) * DRIFT;
      vy[i] += Math.cos(t * 0.000098 + ph[i] + 1.9) * DRIFT;
      if (mx >= 0) {
        var dx = px[i] - mx, dy = py[i] - my;
        var d2 = dx*dx + dy*dy;
        if (d2 < MOUSE_R * MOUSE_R) {
          var d = Math.sqrt(d2) + 0.001;
          var f = (1 - d/MOUSE_R) * (1 - d/MOUSE_R) * MOUSE_F;
          vx[i] += dx/d * f;
          vy[i] += dy/d * f;
        }
      }
      vx[i] *= DAMP; vy[i] *= DAMP;
      px[i] += vx[i]; py[i] += vy[i];
      var m = 0.04;
      if (px[i] < m)   { px[i] = m;   vx[i] =  Math.abs(vx[i]) * 0.3; }
      if (px[i] > 1-m) { px[i] = 1-m; vx[i] = -Math.abs(vx[i]) * 0.3; }
      if (py[i] < m)   { py[i] = m;   vy[i] =  Math.abs(vy[i]) * 0.3; }
      if (py[i] > 1-m) { py[i] = 1-m; vy[i] = -Math.abs(vy[i]) * 0.3; }
    }
  }

  function render() {
    update(performance.now() - t0);
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1fv(uBX, px);
    gl.uniform1fv(uBY, py);
    gl.uniform1fv(uBR, br);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }

  render();
})();
</script>
</body>
</html>
