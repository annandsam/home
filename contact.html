<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Sam Annand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --chalk: #ede9e4; --stone: #6e6860; --slate: #1a1815;
    --ink: #0c0b09; --purple: #6b4fa0;
  }
  html, body {
    min-height: 100%;
    background: #6b4fa0;
    color: #fff;
    font-family: 'Inclusive Sans', sans-serif;
  }


  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0c0b09; --chalk: #ede9e4; --stone: #6e6860;
    --amber: #b89060; --slate: #1a1815;
  }
  html { height: 100%; }
  body {
    height: 100%; background: #6b4fa0; color: var(--chalk);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 48px;
    background: #6b4fa0; border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  .nav-logo {
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.85); text-decoration: none;
  }
  .nav-links { display: flex; list-style: none; position: relative; }
  .nav-item { position: relative; }
  .nav-item > a {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.85); text-decoration: none;
    transition: color 0.2s; padding: 8px 20px; display: block;
  }
  .nav-item > a:hover { opacity: 0.75; }

  /* Dropdowns */
  .dropdown-wrap {
    position: absolute; top: 100%; right: 0;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    min-width: 200px;
  }
  .nav-item:hover > .dropdown-wrap {
    max-height: 400px;
    overflow: visible;
    pointer-events: all;
  }
  .dropdown {
    background: #6b4fa0;
    padding: 8px 0 12px;
    pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  }
  .nav-item:hover > .dropdown-wrap .dropdown {
    pointer-events: all;
  }
  .dropdown a {
    display: block; padding: 10px 20px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(237,233,228,0.8); text-decoration: none;
    transition: color 0.2s, background 0.2s; white-space: nowrap;
  }
  .dropdown a:hover {
    color: #fff; background: rgba(255,255,255,0.08);
  }
  .dd-section {
    font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); padding: 12px 20px 4px; display: block;
  }
  .dd-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 6px 0; }

  /* ── LAYOUT ── */
  .hero {
    height: 100vh; display: grid; grid-template-columns: 1fr;
  }

  /* ── LEFT ── */
  .hero-left {
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 48px 48px 64px;
    background: #4887c9;
  }
  h1.hero-name {
    font-family: 'Bodoni Moda', Georgia, serif;
    font-size: clamp(58px, 6.5vw, 105px);
    font-weight: 400; line-height: 1;
    letter-spacing: 0em; color: var(--chalk);
    opacity: 0; animation: fadeUp 1s ease 0.4s forwards;
    white-space: nowrap;
  }
  .hero-role {
    margin-top: 16px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(237,233,228,0.45);
    opacity: 0; animation: fadeUp 1s ease 0.6s forwards;
  }

  /* ── RIGHT: PAINTING ── */
  .hero-right { position: relative; overflow: hidden; }
  .painting-wrap {
    position: absolute; inset: 0;
    opacity: 0; animation: fadeIn 1.5s ease 0.1s forwards;
    display: flex; align-items: center; justify-content: center;
  }
  .painting-img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: 50% 50%; display: block;
    filter: saturate(0.88) brightness(0.94);
  }
  .painting-caption {
    position: absolute; bottom: 32px; right: 32px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(237,233,228,0.35); text-align: right; line-height: 1.8;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* Flyout submenus */
  .flyout-item { position: relative; }
  .flyout-trigger {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(237,233,228,0.8); text-decoration: none;
    transition: color 0.2s, background 0.2s; white-space: nowrap;
    cursor: default;
  }
  .flyout-trigger:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .flyout-arrow { opacity: 0.5; margin-left: 12px; font-size: 12px; }
  .flyout {
    position: absolute; left: 100%; top: 0;
    background: #6b4fa0;
    min-width: 190px; padding: 8px 0;
    box-shadow: 4px 6px 20px rgba(0,0,0,0.4);
    white-space: nowrap;
    clip-path: inset(0 100% 0 0);
    transition: clip-path 0.22s ease;
    pointer-events: none;
  }
  .flyout-item:hover > .flyout {
    clip-path: inset(0 0% 0 0);
    pointer-events: all;
  }
  .flyout a {
    display: block; padding: 10px 20px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.85); text-decoration: none;
    transition: color 0.2s, background 0.2s;
  }
  .flyout a:hover { color: #fff; background: rgba(255,255,255,0.08); }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .nav-links { gap: 0; }
    .nav-item > a { padding: 8px 12px; font-size: 9px; letter-spacing: 0.12em; }
    .dropdown { right: -12px; }

    .hero { grid-template-columns: 1fr; grid-template-rows: 45vh 55vh; }
    .hero-left {
      padding: 0 24px 32px;
      justify-content: flex-end;
      order: 1;
    }
    h1.hero-name { font-size: clamp(42px, 11vw, 72px); white-space: normal; }
    .hero-role { font-size: 9px; }
    .hero-right { order: 0; }
    .painting-caption { font-size: 8px; bottom: 16px; right: 16px; }
  }



  /* ── PAGE ── */
  .contact-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr;
    padding-top: 84px; /* nav height */
  }

  /* ── LEFT PANEL ── */
  .contact-left {
    background: #6b4fa0;
    padding: 80px 64px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .contact-left h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(36px, 5vw, 72px);
    font-weight: 400; line-height: 1;
    letter-spacing: -0.01em;
    color: #fff; margin-bottom: 24px;
    text-transform: uppercase;
  }
  .contact-left p {
    font-size: 15px; font-weight: 300; line-height: 1.7;
    color: rgba(255,255,255,0.6); max-width: 340px;
    margin-bottom: 48px;
  }
  .contact-direct {
    display: flex; flex-direction: column; gap: 8px;
  }
  .contact-direct a {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); text-decoration: none;
    transition: color 0.2s;
  }
  .contact-direct a:hover { color: #fff; }

  /* ── RIGHT PANEL ── */
  .contact-right {
    background: transparent;
    padding: 100px 64px 80px; max-width: 680px; margin: 0 auto; width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .form-title {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); margin-bottom: 40px;
  }

  .form-group { margin-bottom: 24px; }
  .form-group label {
    display: block;
    font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 0;
    font-family: 'Inclusive Sans', sans-serif;
    font-size: 15px; color: #fff;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.18);
  }
  .form-group textarea {
    resize: vertical;
    min-height: 140px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  /* Honeypot — hidden from humans, bots fill it in */
  .honey { display: none; }

  .form-submit {
    display: flex; align-items: center; gap: 20px;
    margin-top: 8px;
  }
  .submit-btn {
    padding: 16px 36px;
    background: #fff;
    border: none; color: #6b4fa0;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s;
  }
  .submit-btn:hover { background: rgba(255,255,255,0.85); }
  .form-note {
    font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: 0.1em; color: var(--stone);
    line-height: 1.6;
  }

  /* Success message */
  .success-msg {
    display: none;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-left: 3px solid #fff;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: #fff; margin-top: 24px;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .nav-item > a { padding: 8px 12px; font-size: 9px; }
    .contact-page { grid-template-columns: 1fr; padding-top: 72px; }
    .contact-left { padding: 56px 24px 48px; justify-content: flex-start; }
    .contact-right { padding: 48px 24px; }
    .form-row { grid-template-columns: 1fr; }
  }

  .form-group input::placeholder,
  .form-group textarea::placeholder { color: rgba(255,255,255,0.4); }
  .form-group select option { background: #6b4fa0; color: #fff; }
</style>
</head>
<body>

<nav>
  <a href="https://annandsam.github.io/home/" class="nav-logo">SA</a>
  <ul class="nav-links">

    <li class="nav-item"><a href="https://annandsam.github.io/home/">Home</a></li>

    <li class="nav-item">
      <a href="#">Projects</a>
      <div class="dropdown-wrap"><div class="dropdown">
        <a href="https://annandsam.github.io/resono/">Resono</a>
        <a href="https://annandsam.github.io/macro/">Macro</a>
        <div class="dd-divider"></div>
        <div class="flyout-item">
          <a href="#" class="flyout-trigger">Other <span class="flyout-arrow">›</span></a>
          <div class="flyout">
            <a href="https://music.apple.com/gb/album/birds-of-prey-ep/274154965" target="_blank">Architeq</a>
            <a href="https://samply.app/p/KMazQ1LOe1dKvBTZiBRq" target="_blank">Semi-Precious Stones</a>
          </div>
        </div>
        <div class="flyout-item">
          <a href="#" class="flyout-trigger">Collaborations <span class="flyout-arrow">›</span></a>
          <div class="flyout">
            <a href="https://www.sionparkinson.com/perfumes-2" target="_blank">Si&#244;n Parkinson</a>
          </div>
        </div>
      </div></div>
    </li>

    <li class="nav-item"><a href="https://samannand.bandcamp.com" target="_blank">Bandcamp</a></li>
    <li class="nav-item"><a href="https://annandsam.github.io/home/mastering.html">Mastering</a></li>
    <li class="nav-item"><a href="https://annandsam.github.io/home/about.html">About</a></li>
    <li class="nav-item"><a href="https://annandsam.github.io/home/contact.html">Contact</a></li>

  </ul>
</nav>

<div class="contact-page">

  <div class="contact-right" style="grid-column: 1 / -1;">
    <div class="form-title">Send an enquiry</div>

    <!--
      SETUP: Sign up free at formspree.io, create a form,
      then replace YOUR_FORM_ID below with your actual form ID.
      Formspree will email all submissions to sam_annand@hotmail.com.
    -->
    <form
      action="https://formspree.io/f/YOUR_FORM_ID"
      method="POST"
      id="contactForm"
    >
      <!-- Honeypot: bots fill this in, humans don't see it -->
      <div class="honey">
        <input type="text" name="_honey" tabindex="-1" autocomplete="off">
      </div>

      <!-- Tell Formspree where to redirect after submission -->
      <input type="hidden" name="_next" value="https://annandsam.github.io/home/contact.html?sent=true">
      <input type="hidden" name="_subject" value="New enquiry from annandsam.github.io">

      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="">Select a topic</option>
          <option value="Mastering Enquiry">Mastering Enquiry</option>
          <option value="Commission">Commission</option>
          <option value="Collaboration">Collaboration</option>
          <option value="General">General</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Get in touch..."></textarea>
      </div>

      <div class="form-submit">
        <button type="submit" class="submit-btn">Send Message</button>
      </div>

      <div class="success-msg" id="successMsg">
        Message sent — thank you. I'll be in touch soon.
      </div>
    </form>
  </div>

</div>

<script>
  // Show success message if redirected back with ?sent=true
  if (window.location.search.includes('sent=true')) {
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('contactForm').style.display = 'none';
  }
</script>

</body>
</html>
